logging:
  level:
    org.springframework.amqp: WARN
    com.gft.transport: INFO

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: transport-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/transport}
    username: ${SPRING_DATASOURCE_USERNAME:transport}
    password: ${SPRING_DATASOURCE_PASSWORD:transport}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  docker:
    compose:
      enabled: false

  rabbitmq:
    host: ${RABBITMQ_HOST:seal.lmq.cloudamqp.com}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME:ibvztclz}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:ibvztclz}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}
    template:
      retry:
        enabled: true
        initial-interval: 500ms
        max-attempts: 5
        multiplier: 1.5

transport:
  rabbitmq:
    declare-external-exchanges: false

---
spring:
  config:
    activate:
      on-profile: cloudamqp
    import: "optional:file:./.env[.properties]"

  datasource:
    url: jdbc:postgresql://localhost:55432/transport?user=transport&password=transport
    username: transport
    password: transport

  liquibase:
    url: jdbc:postgresql://localhost:55432/transport?user=transport&password=transport
    user: transport
    password: transport

---
logging:
  level:
    root: WARN
    com.gft.transport: INFO
    com.gft.transport.delivery.infrastructure.messaging.TimeAdvancedListener: WARN
    com.gft.transport.delivery.application.usecase.AdvanceTrucks: WARN

spring:
  config:
    activate:
      on-profile: aws

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  liquibase:
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:true}

transport:
  rabbitmq:
    declare-external-exchanges: false

---
spring:
  config:
    activate:
      on-profile: local

  docker:
    compose:
      enabled: false
      profiles:
        active: local-rabbitmq

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    ssl:
      enabled: false

transport:
  rabbitmq:
    declare-external-exchanges: true

openapi: 3.0.3
info:
  title: Transport Service API
  description: |
    REST API for the Transport Service - Supply Chain Workshop GFT 2026.

    Messaging contracts:

    Transport publishes domain events to RabbitMQ exchanges. The publisher only sends a message to an exchange with a routing key; consumer services own their queues and bindings.

    Published by Transport:
    - trucks.exchange + truck.registered.v1
    - trucks.exchange + truck.status.changed.v1
    - trucks.exchange + truck.position.updated.v1
    - shipments.exchange + delivery.completed.v1

    Consumed by Transport:
    - shipments.exchange + shipment.requested.v1 -> trucks.shipment.requested
    - ms-time.exchange + time.advanced.v1 -> trucks.time.advanced
    - warehouses.exchange + warehouse.registered.v1 -> trucks.warehouse.registered

    Important: Reporting, Map UI and other consumers must declare their own queues and bind them to the exchange/routing keys they need. Transport does not create bindings for other services.
  version: 1.0.0-MVP

servers:
  - url: /
    description: Current host

paths:
  /trucks:
    post:
      summary: Register a new truck
      description: Creates a truck in the fleet. Publishes truck.registered.v1 and truck.status.changed.v1 (reason TRUCK_REGISTERED) to RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTruckRequest'
            example:
              name: "Truck 01"
              x: 0
              y: 0
              capacity: 10
      responses:
        '201':
          description: Truck registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TruckResponse'
              example:
                truckId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: "Truck 01"
                location:
                  x: 0
                  y: 0
                status: AVAILABLE
        '400':
          description: Validation error (blank name or capacity < 1)

    get:
      summary: Get all trucks
      description: Returns the current fleet state. Used by Map (UI) on startup before receiving events.
      responses:
        '200':
          description: List of trucks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TruckResponse'
              example:
                - truckId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  name: "Truck 01"
                  location:
                    x: 3
                    y: 5
                  status: IN_TRANSIT
                - truckId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                  name: "Truck 02"
                  location:
                    x: 0
                    y: 0
                  status: AVAILABLE

components:
  schemas:
    CreateTruckRequest:
      type: object
      required:
        - name
        - x
        - y
        - capacity
      properties:
        name:
          type: string
          minLength: 1
        x:
          type: integer
        y:
          type: integer
        capacity:
          type: integer
          minimum: 1

    TruckResponse:
      type: object
      properties:
        truckId:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        status:
          $ref: '#/components/schemas/TruckStatus'

    Location:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer

    TruckStatus:
      type: string
      enum:
        - AVAILABLE
        - IN_TRANSIT
        - DELIVERED
